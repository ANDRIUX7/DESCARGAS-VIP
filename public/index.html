<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DESCARGAS VIP</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card" id="login">
  <h2>Acceso VIP</h2>
  <input type="password" id="pass" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
</div>

<div class="card" id="app" style="display:none;">
  <h2>DESCARGAS VIP</h2>
  <input id="url" placeholder="Pega el link del video">
  <button onclick="descargar()">Descargar</button>

  <div class="progress">
    <div class="bar" id="bar"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
